- name: Download OpenWrt rootfs file
        id: download
        if: ${{ steps.init.outputs.status == 'success' }}
        run: |
          # 1. 修正了 API 地址 (删掉了多余的 .api)
          # 2. 增加了 -L 参数允许重定向
          latest_version=$(curl -s -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest")
          
          # 3. 提取 rootfs 下载链接
          latest_url=$(echo ${latest_version} | jq -r '.assets[] | select(.name | endswith("-rootfs.tar.gz")) | .url' | head -n 1)
          
          if [[ -z "${latest_url}" || "${latest_url}" == "null" ]]; then
            echo "错误：在 Release 中没找到 rootfs 文件！请确认之前的源码编译任务是否已经成功变绿。"
            exit 1
          fi
          
          mkdir -p opt/download
          # 4. 执行下载
          curl -fsSL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/octet-stream" "${latest_url}" \
               -o "opt/download/rootfs.tar.gz"
          
          echo "build_tag=SW799_Custom_$(date +"%Y.%m.%d")" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}
