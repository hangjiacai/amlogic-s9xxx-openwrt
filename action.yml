#==========================================================================
# Description: Build OpenWrt for SW799 (RK3399) - Customized by hangjiacai
#==========================================================================

name: Build OpenWrt using Unifreq scripts

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      openwrt_soc:
        description: "Select device board."
        required: false
        default: "rk3399"
        type: choice
        options:
          - rk3399
          - s905
          - all
      customize_rk3399:
        description: "Set customize rk3399 devices"
        required: false
        default: "tvi3315a:rk3399-tvi3315a.dtb/sw799:rk3399-bozz-sw799.dtb"
        type: choice
        options:
          - tvi3315a:rk3399-tvi3315a.dtb/sw799:rk3399-bozz-sw799.dtb
          - none
      openwrt_ip:
        description: "Set OpenWrt default IP address"
        required: false
        default: "192.168.100.1"
      kernel_repo:
        description: "Set the kernel repository"
        required: false
        default: "ophub/kernel"
        type: choice
        options:
          - ophub/kernel
          - breakingbadboy/OpenWrt
      openwrt_kernel:
        description: "Select kernel version"
        required: false
        default: "6.6.y"
        type: choice
        options:
          - 6.6.y
          - 6.12.y
          - 6.1.y
      auto_kernel:
        description: "Auto use the latest kernel"
        required: false
        default: true
        type: boolean
      builder_name:
        description: "Set OpenWrt builder signature."
        required: false
        default: "hangjiacai"
        type: choice
        options:
          - hangjiacai
          - ophub

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize the build environment
        id: init
        run: |
          sudo -E apt-get -y update
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-make-openwrt-depends)
          sudo -E timedatectl set-timezone "${TZ}"
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Download OpenWrt rootfs file
        id: download
        working-directory: /opt
        run: |
          # 核心逻辑：从您自己的 Release 中抓取最新的 rootfs
          latest_url=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases | \
            jq -r '.[0].assets[] | select(.name | endswith("rootfs.tar.gz")) | .url' | head -n 1)
          
          if [ -z "$latest_url" ] || [ "$latest_url" == "null" ]; then
            echo "错误：没找到 rootfs 文件，请先运行编译源码的工作流！"
            exit 1
          fi

          sudo mkdir -p download
          sudo curl -fsSL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" "$latest_url" \
            -o "download/rootfs.tar.gz"
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Package OpenWrt Firmware
        uses: ophub/flippy-openwrt-actions@main
        if: steps.download.outputs.status == 'success'
        env:
          OPENWRT_ARMSR: opt/download/rootfs.tar.gz
          PACKAGE_SOC: ${{ inputs.openwrt_soc }}
          KERNEL_REPO_URL: ${{ inputs.kernel_repo }}
          KERNEL_VERSION_NAME: ${{ inputs.openwrt_kernel }}
          KERNEL_AUTO_LATEST: ${{ inputs.auto_kernel }}
          OPENWRT_IP: ${{ inputs.openwrt_ip }}
          CUSTOMIZE_RK3399: ${{ inputs.customize_rk3399 }}
          WHOAMI: ${{ inputs.builder_name }}

      - name: Upload to Release
        uses: ncipollo/release-action@v1
        if: env.PACKAGED_STATUS == 'success'
        with:
          tag: SW799_OpenWrt_${{ github.run_number }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### SW799 专属固件 - 编译完成
            - **作者**: ${{ inputs.builder_name }}
            - **默认 IP**: `192.168.100.1`
            - **插件说明**: 包含 Docker, HomeProxy, Lucky (取决于 rootfs 源码)
            - **DTB**: `rk3399-bozz-sw799.dtb`
